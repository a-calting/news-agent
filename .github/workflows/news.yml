name: Hourly news agent

# When to run.
on:
  schedule:
    # We try several times per hour, at off-the-hour minutes. Why:
    #   * GitHub's free scheduler is "best effort" and quietly DROPS most jobs
    #     scheduled at the top of the hour (":00") because that minute is the
    #     most congested worldwide. Spreading attempts to :09/:29/:49 (and away
    #     from :00) means at least one usually survives every hour.
    #   * Running more often is safe: the agent remembers what it already sent
    #     (notified.json), so a story is never pushed twice and the daily digest
    #     still fires only once. Extra runs just catch fresh news sooner —
    #     close to when it's published, instead of bunching up in the evening.
    # GitHub uses UTC; the script applies your Europe/Paris timezone and quiet
    # hours itself, so no adjustment is needed here.
    - cron: "9,29,49 * * * *"
  # Lets you also run it on demand from the Actions tab ("Run workflow").
  workflow_dispatch: {}

# Allow the job to push the updated digest page back into the repository.
permissions:
  contents: write

# Never let two runs overlap (they would both try to push the page).
concurrency:
  group: news-agent
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install the libraries
        run: python -m pip install -r requirements.txt

      - name: Let the agent commit the digest page
        run: |
          git config user.name "news-agent"
          git config user.email "actions@users.noreply.github.com"

      - name: Run the news agent
        # The secrets you store in GitHub become environment variables here.
        # The script reads them with os.getenv(...), exactly like your .env file.
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python news.py
